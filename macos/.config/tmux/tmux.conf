set -g default-terminal "tmux-256color"
set -s escape-time 0
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# remap prefix from 'C-b' to 'C-a'
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Start windows and panes at 1, not 0 to make hotkeys easier
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Reload the tmux config with 'Prefix + r'
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Swap t and c so t creates windows(tabs) and c shows the clock
unbind t
unbind c
bind t new-window
bind c clock-mode

# vim keys for copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R


# DESIGN TWEAKS
# black, red, green, yellow, blue, magenta, cyan, white

# don't do anything when a 'bell' rings
#set -g visual-activity off
#set -g visual-bell off
#set -g visual-silence off
#setw -g monitor-activity off
#set -g bell-action none

# clock mode
setw -g clock-mode-colour cyan

# copy mode
setw -g mode-style 'fg=black bg=brightmagenta'

# panes
set -g pane-border-style 'fg=green'
set -g pane-active-border-style 'fg=cyan'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=green'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=white bg=magenta'
set -g status-right ' #S #[fg=black,bg=cyan] %Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=green'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=green bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=cyan]#F '

setw -g window-status-bell-style 'fg=white bg=magenta'

# messages
set -g message-style 'fg=white bg=magenta'